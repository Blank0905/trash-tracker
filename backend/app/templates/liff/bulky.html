<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c0b">
    <title>大型廢棄物清運</title>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- Markdown 渲染（marked）＋ HTML 消毒（DOMPurify），用來顯示清運說明內文 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <style>
        /* ===== Design tokens ===== */
        :root {
            --bg:            #0a0c0b;
            --surface:       #14181a;
            --surface-2:     #1c2024;
            --border:        #262d31;
            --border-strong: #3a4046;

            --text:      #eef0ec;
            --text-dim:  #b8c0bc;
            --text-mute: #707a76;

            --brand:       #00B900;
            --brand-light: #2bd84e;
            --brand-soft:  rgba(0, 185, 0, 0.12);
            --brand-tint:  rgba(0, 185, 0, 0.22);
            --brand-glow:  0 0 24px rgba(0, 185, 0, 0.35);

            --font-cjk:  'PingFang TC', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'Heiti TC', 'Noto Sans CJK TC', sans-serif;
            --font-serif: 'Noto Serif TC', 'Songti TC', 'PingFang TC', 'Microsoft JhengHei', serif;
            --font-mono: ui-monospace, 'SF Mono', SFMono-Regular, 'Cascadia Code', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; }
        body {
            min-height: 100vh;
            font-family: var(--font-cjk);
            font-feature-settings: "tnum" 1, "kern" 1;
            color: var(--text);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 70% 35% at 50% -10%, rgba(0,185,0,0.05), transparent 60%);
            padding:
                calc(env(safe-area-inset-top, 0px) + 20px)
                18px
                calc(env(safe-area-inset-bottom, 0px) + 36px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container { width: 100%; max-width: 460px; }

        /* === Eyebrow + Title === */
        .page-eyebrow {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 14px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--text-mute);
        }
        .page-eyebrow::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--brand);
            box-shadow: var(--brand-glow);
        }
        .page-eyebrow .line {
            flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* 主標：政府公告感，serif 字體有「告知文件」的莊重感 */
        h2 {
            margin: 0 0 22px;
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.005em;
            line-height: 1.3;
        }

        /* === 縣市 segmented control（同 bag） === */
        .city-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 18px;
            padding: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .city-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 9px;
            padding: 10px 0;
            font-family: var(--font-cjk);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: background 0.18s ease, color 0.18s ease;
        }
        .city-btn:active { transform: scale(0.97); }
        .city-btn.active {
            background: var(--brand);
            color: #001a00;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,185,0,0.3);
        }

        #status {
            text-align: center;
            color: var(--text-mute);
            margin: 40px 0;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        /* === 公告卡片：editorial 質感 === */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px 22px 18px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            /* 頂部一條 LINE 綠光帶，視覺上「蓋戳」感 */
            content: '';
            position: absolute;
            top: 0; left: 18px; right: 18px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent);
            box-shadow: 0 0 10px rgba(0,185,0,0.4);
        }

        .card-foot {
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
            display: flex; align-items: center; gap: 8px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-mute);
        }
        .card-foot::before {
            content: '';
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--text-mute);
        }

        /* === Markdown 渲染區（md-body 與所有子元素為 JS 寫入的 HTML，不能改結構） === */
        .md-body {
            font-family: var(--font-cjk);
            font-size: 15px;
            line-height: 1.85;
            color: var(--text);
            word-break: break-word;
        }
        .md-body > :first-child { margin-top: 0; }
        .md-body > :last-child { margin-bottom: 0; }

        .md-body p {
            margin: 0 0 14px;
            color: var(--text-dim);
            line-height: 1.85;
        }

        /* 標題：editorial 階層感 */
        .md-body h1, .md-body h2, .md-body h3 {
            font-family: var(--font-cjk);
            text-align: left;
            margin: 22px 0 10px;
            color: var(--text);
            font-weight: 700;
            letter-spacing: -0.005em;
            display: flex; align-items: center; gap: 10px;
        }
        .md-body h1 { font-size: 17px; }
        .md-body h2 { font-size: 16px; }
        .md-body h3 { font-size: 15px; }
        /* 小節標題左側細條，呼應主視覺 */
        .md-body h1::before, .md-body h2::before, .md-body h3::before {
            content: '';
            width: 3px; height: 14px;
            background: var(--brand);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .md-body ul, .md-body ol { margin: 0 0 14px; padding-left: 22px; }
        .md-body li { margin: 6px 0; color: var(--text-dim); line-height: 1.75; }
        .md-body ul li::marker { color: var(--brand); }
        .md-body ol li::marker { color: var(--brand-light); font-family: var(--font-mono); font-weight: 600; }

        .md-body a {
            color: var(--brand-light);
            text-decoration: none;
            border-bottom: 1px solid var(--brand-tint);
            padding-bottom: 1px;
            word-break: break-all;
            transition: border-color 0.2s ease;
        }
        .md-body a:active { border-color: var(--brand); }

        .md-body code {
            font-family: var(--font-mono);
            background: var(--surface-2);
            color: var(--brand-light);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.88em;
            border: 1px solid var(--border);
        }

        .md-body blockquote {
            margin: 14px 0;
            padding: 10px 14px;
            border-left: 3px solid var(--brand);
            background: var(--brand-soft);
            border-radius: 0 8px 8px 0;
            color: var(--text-dim);
            font-style: normal;
        }
        .md-body blockquote p { margin: 0; color: var(--text-dim); }

        .md-body img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 10px 0;
            border: 1px solid var(--border);
        }

        /* 強調粗體：mono uppercase 看起來像 callout */
        .md-body strong { color: var(--text); font-weight: 700; }
        .md-body em { color: var(--brand-light); font-style: normal; }
        .md-body hr {
            border: none;
            border-top: 1px dashed var(--border);
            margin: 18px 0;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="page-eyebrow">
        BULKY · 大型廢棄物清運指南
        <span class="line"></span>
    </div>

    <h2 id="pageTitle">大型廢棄物清運</h2>

    <div class="city-bar" id="cityBar"></div>
    <div id="status">載入中…</div>
    <div id="list"></div>
</div>

<script>
    // 後端注入（見 app/api/pages.py）
    const LIFF_ID = "{{ liff_id }}";
    let lineUserId = null;

    // city 值需與 DB 的 ENUM 全名一致（台北市 / 新北市 / 基隆市）
    const CITIES = ['台北市', '新北市', '基隆市'];
    let activeCity = CITIES[0];

    // 支援用網址參數指定初始縣市，例如 /bulky?city=新北市
    const wantCity = new URLSearchParams(location.search).get('city');
    if (wantCity && CITIES.includes(wantCity)) activeCity = wantCity;

    // 統一的後端呼叫方式：自動帶上 X-Line-User-Id（資訊類為公開 API，後端會忽略）
    async function api(path, options = {}) {
        const headers = Object.assign(
            { 'Content-Type': 'application/json', 'X-Line-User-Id': lineUserId || '' },
            options.headers || {}
        );
        const res = await fetch(`/api${path}`, { ...options, headers });
        return res.json();
    }

    // 防 XSS：插入 DOM 前轉義
    function esc(s) {
        return String(s ?? '').replace(/[&<>"']/g, c =>
            ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // 時間字串簡化為 YYYY-MM-DD HH:MM
    function fmtTime(s) {
        if (!s) return '';
        return esc(String(s).replace('T', ' ').slice(0, 16));
    }

    // Markdown 渲染：breaks=true 讓單一換行也斷行（保留舊純文字排版），
    // 輸出一律經 DOMPurify 消毒防 XSS；連結自動開新分頁。
    marked.setOptions({ breaks: true, gfm: true });
    DOMPurify.addHook('afterSanitizeAttributes', node => {
        if (node.tagName === 'A') {
            node.setAttribute('target', '_blank');
            node.setAttribute('rel', 'noopener noreferrer');
        }
    });
    function mdToSafeHtml(text) {
        return DOMPurify.sanitize(marked.parse(String(text ?? '')));
    }

    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');

    // 卡片渲染（欄位對應 app/api/info.py 的 bulky-waste 回傳）
    function renderBulky(items) {
        return items.map(i => `
            <div class="card">
                <div class="md-body">${mdToSafeHtml(i.content)}</div>
                ${i.updated_at ? `<div class="card-foot">LAST UPDATED · ${fmtTime(i.updated_at)}</div>` : ''}
            </div>`).join('');
    }

    function buildCityBar() {
        document.getElementById('cityBar').innerHTML = CITIES.map(c =>
            `<button class="city-btn ${c === activeCity ? 'active' : ''}" data-city="${esc(c)}">${esc(c)}</button>`
        ).join('');
    }

    const titleEl = document.getElementById('pageTitle');

    async function load() {
        buildCityBar();
        titleEl.innerText = '大型廢棄物清運';   // 預設標題，載入成功後換成該市標題
        statusEl.style.display = 'block';
        statusEl.innerText = '載入中…';
        listEl.innerHTML = '';
        try {
            const res = await api(`/info/bulky-waste?city=${encodeURIComponent(activeCity)}`);
            if (res.status !== 'success') {
                statusEl.innerText = '載入失敗：' + (res.message || '請稍後再試。');
                return;
            }
            const items = res.data || [];
            if (items.length === 0) {
                statusEl.innerText = '查無資料';
                return;
            }
            statusEl.style.display = 'none';
            // 把該市標題拉到最上面的大標；卡片內只留 Markdown 內容
            titleEl.innerText = items[0].title || '大型廢棄物清運';
            listEl.innerHTML = renderBulky(items);
        } catch (e) {
            console.error('載入大型廢棄物清運失敗', e);
            statusEl.innerText = '載入失敗，請稍後再試。';
        }
    }

    // 切換縣市
    document.getElementById('cityBar').addEventListener('click', e => {
        const btn = e.target.closest('button[data-city]');
        if (!btn || btn.dataset.city === activeCity) return;
        activeCity = btn.dataset.city;
        load();
    });

    // 資訊為公開資料，不強制登入；liff.init 僅為在 LINE 內整合，失敗也照常顯示
    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
            }
        } catch (e) {
            console.warn('LIFF 初始化略過（可能非 LINE 環境）', e);
        }
        load();
    }
    main();
</script>

</body>
</html>
