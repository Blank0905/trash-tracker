<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c0b">
    <title>垃圾袋規範</title>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* ===== Design tokens ===== */
        :root {
            --bg:            #0a0c0b;
            --surface:       #14181a;
            --surface-2:     #1c2024;
            --surface-glass: rgba(20, 24, 26, 0.78);
            --border:        #262d31;
            --border-strong: #3a4046;

            --text:      #eef0ec;
            --text-dim:  #a8b0ac;
            --text-mute: #606a66;

            --brand:       #00B900;
            --brand-light: #2bd84e;
            --brand-soft:  rgba(0, 185, 0, 0.12);
            --brand-tint:  rgba(0, 185, 0, 0.22);
            --brand-glow:  0 0 24px rgba(0, 185, 0, 0.35);

            --amber:       #ffb547;
            --amber-soft:  rgba(255, 181, 71, 0.14);

            --font-cjk:  'PingFang TC', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'Heiti TC', 'Noto Sans CJK TC', sans-serif;
            --font-mono: ui-monospace, 'SF Mono', SFMono-Regular, 'Cascadia Code', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; }
        body {
            min-height: 100vh;
            font-family: var(--font-cjk);
            font-feature-settings: "tnum" 1, "kern" 1;
            color: var(--text);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,185,0,0.05), transparent 60%);
            padding:
                calc(env(safe-area-inset-top, 0px) + 20px)
                18px
                calc(env(safe-area-inset-bottom, 0px) + 32px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container { width: 100%; max-width: 440px; }

        /* === Eyebrow + Title === */
        .page-eyebrow {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 14px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--text-mute);
        }
        .page-eyebrow::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--brand);
            box-shadow: var(--brand-glow);
        }
        .page-eyebrow .line {
            flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        h2 {
            margin: 0 0 22px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        /* === 縣市 segmented control（city-bar 與 city-btn 是 JS hook） === */
        .city-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 18px;
            padding: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .city-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 9px;
            padding: 10px 0;
            font-family: var(--font-cjk);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: background 0.18s ease, color 0.18s ease;
        }
        .city-btn:active { transform: scale(0.97); }
        .city-btn.active {
            background: var(--brand);
            color: #001a00;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,185,0,0.3);
        }

        /* === Status text === */
        #status {
            text-align: center;
            color: var(--text-mute);
            margin: 40px 0;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        /* === 垃圾袋卡片（card / card-title / card-sub / kv / badge 是 JS hook） === */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s ease;
        }
        .card:active { border-color: var(--border-strong); }
        /* 左側細條，視覺呼應產品價籤 */
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 18px; bottom: 18px;
            width: 3px;
            background: linear-gradient(180deg, var(--brand-light), var(--brand));
            border-radius: 0 2px 2px 0;
            opacity: 0.7;
        }

        /* 標題：產品名稱大字 + 行內 badge */
        .card-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.35;
            letter-spacing: -0.005em;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* 規格分類徽章：（環保兩用 / 提耳式 等） */
        .badge {
            display: inline-flex;
            align-items: center;
            font-family: var(--font-cjk);
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 6px;
            background: var(--surface-2);
            color: var(--text-dim);
            border: 1px solid var(--border-strong);
            letter-spacing: 0.03em;
            margin-left: 0; /* 覆蓋舊版 6px，改用 gap 控間距 */
            vertical-align: baseline;
        }

        /* 規格與價格列：mono 字體，呈現「資料感」 */
        .card-sub {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 500;
            color: var(--brand-light);
            margin-top: 8px;
            padding: 8px 10px;
            background: var(--brand-soft);
            border: 1px solid var(--brand-tint);
            border-radius: 8px;
            letter-spacing: 0.01em;
            line-height: 1.5;
        }

        /* 附加資訊列（購買地點、備註） */
        .kv {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 10px;
            line-height: 1.55;
            padding-left: 12px;
            position: relative;
        }
        .kv::before {
            content: '';
            position: absolute;
            left: 0; top: 8px;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--text-mute);
        }
        .kv b {
            color: var(--text);
            font-weight: 600;
            margin-right: 2px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="page-eyebrow">
        BAG · 垃圾袋規範
        <span class="line"></span>
    </div>

    <h2>專用垃圾袋規範</h2>

    <div class="city-bar" id="cityBar"></div>
    <div id="status">載入中…</div>
    <div id="list"></div>
</div>

<script>
    // 後端注入（見 app/api/pages.py）
    const LIFF_ID = "{{ liff_id }}";
    let lineUserId = null;

    // city 值需與 DB 的 ENUM 一致；bag_regulations 僅有台北市/新北市（基隆無專用垃圾袋）
    const CITIES = ['台北市', '新北市'];
    let activeCity = CITIES[0];

    // 支援用網址參數指定初始縣市，例如 /bag?city=新北市
    const wantCity = new URLSearchParams(location.search).get('city');
    if (wantCity && CITIES.includes(wantCity)) activeCity = wantCity;

    // 統一的後端呼叫方式：自動帶上 X-Line-User-Id（資訊類為公開 API，後端會忽略）
    async function api(path, options = {}) {
        const headers = Object.assign(
            { 'Content-Type': 'application/json', 'X-Line-User-Id': lineUserId || '' },
            options.headers || {}
        );
        const res = await fetch(`/api${path}`, { ...options, headers });
        return res.json();
    }

    // 防 XSS：插入 DOM 前轉義
    function esc(s) {
        return String(s ?? '').replace(/[&<>"']/g, c =>
            ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');

    // 容量 · 每包售價（含每包個數）· 單個單價 —— 有才顯示
    function priceText(r) {
        const parts = [];
        if (r.volume_liters != null) parts.push(`${esc(r.volume_liters)} 公升`);
        if (r.price_per_pack != null) {
            const pack = r.units_per_pack ? `（${esc(r.units_per_pack)} 入）` : '';
            parts.push(`每包 NT$${esc(r.price_per_pack)}${pack}`);
        }
        if (r.unit_price != null) parts.push(`單個 NT$${esc(r.unit_price)}`);
        return parts.join(' · ');
    }

    // 卡片渲染（欄位對應 app/api/info.py 的 bag-regulations 回傳）
    function renderBag(items) {
        return items.map(r => `
            <div class="card">
                <div class="card-title">${esc(r.name)}${r.category ? `<span class="badge">${esc(r.category)}</span>` : ''}${r.style ? `<span class="badge">${esc(r.style)}</span>` : ''}</div>
                <div class="card-sub">${priceText(r)}</div>
                ${r.purchase_locations ? `<div class="kv"><b>購買地點：</b>${esc(r.purchase_locations)}</div>` : ''}
                ${r.notes ? `<div class="kv">${esc(r.notes)}</div>` : ''}
            </div>`).join('');
    }

    function buildCityBar() {
        document.getElementById('cityBar').innerHTML = CITIES.map(c =>
            `<button class="city-btn ${c === activeCity ? 'active' : ''}" data-city="${esc(c)}">${esc(c)}</button>`
        ).join('');
    }

    async function load() {
        buildCityBar();
        statusEl.style.display = 'block';
        statusEl.innerText = '載入中…';
        listEl.innerHTML = '';
        try {
            const res = await api(`/info/bag-regulations?city=${encodeURIComponent(activeCity)}`);
            if (res.status !== 'success') {
                statusEl.innerText = '載入失敗：' + (res.message || '請稍後再試。');
                return;
            }
            const items = res.data || [];
            if (items.length === 0) {
                statusEl.innerText = '查無資料';
                return;
            }
            statusEl.style.display = 'none';
            listEl.innerHTML = renderBag(items);
        } catch (e) {
            console.error('載入垃圾袋規範失敗', e);
            statusEl.innerText = '載入失敗，請稍後再試。';
        }
    }

    // 切換縣市
    document.getElementById('cityBar').addEventListener('click', e => {
        const btn = e.target.closest('button[data-city]');
        if (!btn || btn.dataset.city === activeCity) return;
        activeCity = btn.dataset.city;
        load();
    });

    // 資訊為公開資料，不強制登入；liff.init 僅為在 LINE 內整合，失敗也照常顯示
    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
            }
        } catch (e) {
            console.warn('LIFF 初始化略過（可能非 LINE 環境）', e);
        }
        load();
    }
    main();
</script>

</body>
</html>
