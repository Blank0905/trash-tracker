<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c0b">
    <title>附近垃圾車站點</title>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- Leaflet（OpenStreetMap，免 API key、免信用卡） -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 在路線上加方向箭頭 -->
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
    <style>
        /* ====================================================
           DESIGN TOKENS — "ops console" 風格
           沉穩深色基底；LINE 綠保留為單一信號色；資料用 mono
           ==================================================== */
        :root {
            --bg:            #0a0c0b;
            --surface:       #14181a;
            --surface-2:     #1c2024;
            --surface-glass: rgba(20, 24, 26, 0.78);
            --border:        #262d31;
            --border-strong: #3a4046;

            --text:      #eef0ec;
            --text-dim:  #a8b0ac;
            --text-mute: #606a66;

            --brand:       #00B900;
            --brand-light: #2bd84e;
            --brand-soft:  rgba(0, 185, 0, 0.12);
            --brand-tint:  rgba(0, 185, 0, 0.22);

            --amber:  #ffb547;

            --radius-md: 14px;
            --radius-lg: 22px;

            --shadow-1:     0 4px 16px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.6);
            --shadow-2:     0 14px 36px rgba(0,0,0,0.55), 0 4px 10px rgba(0,0,0,0.4);
            --shadow-panel: 0 -22px 60px rgba(0,0,0,0.6), 0 -1px 0 var(--border-strong);

            /* 不引入新 CDN/套件，僅用系統字體；PingFang TC（iOS）+ Microsoft JhengHei（Windows/Android）
               作為 CJK 主字；資料部分用系統 mono（SF Mono / Consolas） */
            --font-cjk:  'PingFang TC', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'Heiti TC', 'Noto Sans CJK TC', sans-serif;
            --font-mono: ui-monospace, 'SF Mono', SFMono-Regular, 'Cascadia Code', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: var(--font-cjk);
            font-feature-settings: "tnum" 1, "kern" 1;  /* 等寬數字 + 字距微調 */
            font-synthesis: none;
            color: var(--text);
            background: var(--bg);
            overflow: hidden;
        }

        /* ====================================================
           MAP & LEAFLET — 把 OSM 圖磚反色成暗色主題
           只影響底圖；marker / overlay 在另一個 pane，不被波及
           ==================================================== */
        #map {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #1a2020 0%, #0a0c0b 75%);
        }
        /* 暗色地圖只在 body.map-dark 時生效；JS 預設套上 + localStorage 記住偏好 */
        body.map-dark .leaflet-tile-pane {
            filter: invert(0.92) hue-rotate(180deg) brightness(0.92) contrast(0.86) saturate(0.65);
        }
        /* 亮色地圖切換時，地圖底圖底色換成淺灰，避免黑色背景在 tile 載入間漏色 */
        body.map-light #map {
            background: radial-gradient(ellipse at 50% 40%, #e9eced 0%, #c9ced0 75%);
        }

        /* Leaflet tooltip 對齊主題 */
        .leaflet-tooltip {
            background: var(--surface-2) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            padding: 6px 10px !important;
            font-family: var(--font-cjk) !important;
            font-size: 12px !important;
            font-weight: 500 !important;
            letter-spacing: 0.01em !important;
            box-shadow: var(--shadow-1) !important;
        }
        .leaflet-tooltip-top::before  { border-top-color: var(--border) !important; }
        .leaflet-tooltip-bottom::before { border-bottom-color: var(--border) !important; }
        .leaflet-tooltip-left::before { border-left-color: var(--border) !important; }
        .leaflet-tooltip-right::before { border-right-color: var(--border) !important; }

        /* Leaflet zoom 控制：暗色玻璃感 */
        .leaflet-control-zoom {
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            overflow: hidden;
            box-shadow: var(--shadow-1) !important;
            margin: 12px !important;
        }
        .leaflet-control-zoom a {
            background: var(--surface-glass) !important;
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
            color: var(--text) !important;
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            font-family: var(--font-cjk) !important;
            font-weight: 300;
            width: 36px !important; height: 36px !important;
            line-height: 36px !important;
            font-size: 18px !important;
        }
        .leaflet-control-zoom a:last-child { border-bottom: none !important; }
        .leaflet-control-zoom a:hover {
            background: var(--surface-2) !important;
            color: var(--brand-light) !important;
        }
        .leaflet-control-attribution {
            background: rgba(20, 24, 26, 0.55) !important;
            backdrop-filter: blur(8px);
            color: var(--text-mute) !important;
            font-size: 9px !important;
            font-family: var(--font-mono) !important;
            padding: 2px 6px !important;
            border-radius: 4px 0 0 0 !important;
        }
        .leaflet-control-attribution a { color: var(--text-dim) !important; }

        /* 預設站點 marker（藍色 droplet）→ 用 CSS filter 改為 LINE 綠（不動 JS） */
        img.leaflet-marker-icon {
            filter: hue-rotate(95deg) saturate(2) brightness(1.05)
                    drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .leaflet-marker-shadow { opacity: 0.45; }

        /* ====================================================
           TOP COMMAND BAR — 心跳燈 + uppercase 標籤 + 半徑下拉
           ==================================================== */
        #topbar {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 12px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            display: flex; align-items: center; gap: 0;
            background: var(--surface-glass);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 5px 6px 5px 16px;
            box-shadow: var(--shadow-1);
        }
        /* 系統心跳燈：呼吸感的綠點，呼應 ops console 識別 */
        #topbar::before {
            content: '';
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--brand);
            box-shadow: 0 0 0 2px rgba(0,185,0,0.18), 0 0 12px rgba(0,185,0,0.55);
            animation: pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            margin-right: 12px;
            flex-shrink: 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.35; transform: scale(0.8); }
        }
        .topbar-label {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.24em;
            color: var(--text-mute);
            text-transform: uppercase;
            margin-right: 10px;
        }
        /* 半徑下拉做成藥丸狀的 mono 數值，視覺上像「儀表板顯示值」 */
        #radius {
            appearance: none; -webkit-appearance: none;
            border: 1px solid var(--border-strong);
            background-color: var(--surface-2);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            padding: 8px 32px 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none' stroke='%23a8b0ac' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><polyline points='3,4.5 6,7.5 9,4.5'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 10px;
        }
        #radius:focus { outline: none; border-color: var(--brand); }
        /* dropdown 選項在原生選單裡（無法跨平台統一樣式），維持系統預設 */

        /* ====================================================
           FAB STACK — 右下垂直堆兩顆按鈕
           （都同尺寸 56×56；以顏色與細節區分主/次）
           ==================================================== */
        .fab-stack {
            position: fixed;
            right: calc(env(safe-area-inset-right, 0px) + 14px);
            bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
            z-index: 1100;
            display: flex; flex-direction: column; gap: 12px;
        }
        .fab {
            position: relative;
            width: 56px; height: 56px;
            border-radius: 18px;
            border: 1px solid var(--border-strong);
            background: var(--surface-glass);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            padding: 0;
            box-shadow: var(--shadow-2);
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
        .fab:active { transform: scale(0.93); }
        .fab svg { width: 26px; height: 26px; pointer-events: none; }

        /* 定位鍵 = 主要動作；帶 LINE 綠漸層 + 邊光 */
        .fab-primary {
            background:
                linear-gradient(180deg, rgba(0,185,0,0.18) 0%, rgba(0,185,0,0.04) 100%),
                var(--surface-glass);
            border-color: rgba(0,185,0,0.4);
            color: var(--brand-light);
        }
        .fab-primary:active {
            background: var(--brand);
            color: #001a00;
        }

        /* 拖曳圖釘鍵：右上貼一個小琥珀燈 = 「可拖」的視覺提示 */
        #dragPin { cursor: grab; touch-action: none; }
        #dragPin:active { cursor: grabbing; }
        #dragPin::after {
            content: '';
            position: absolute;
            top: -3px; right: -3px;
            width: 10px; height: 10px;
            background: var(--amber);
            border-radius: 50%;
            border: 2px solid var(--bg);
            box-shadow: 0 0 8px rgba(255,181,71,0.5);
        }
        /* dragPin 內紅色 SVG：尺寸對齊地圖上會放的搜尋大頭針 */
        #dragPin .pin-svg { width: 30px; height: 38px; pointer-events: none; }

        /* 主題切換鍵：依當前主題只顯示其中一顆圖示（按了會切到另一個） */
        #themeToggle .icon-sun, #themeToggle .icon-moon { display: none; }
        body.map-dark  #themeToggle .icon-sun  { display: block; } /* 暗色中：顯示太陽（點了會變亮） */
        body.map-light #themeToggle .icon-moon { display: block; } /* 亮色中：顯示月亮（點了會變暗） */

        /* ====================================================
           SEARCH PIN / GHOST — 地圖上紅針 & 拖曳分身
           （class 名 .search-pin / .pin-ghost 與 JS 綁定，必須保留）
           ==================================================== */
        .search-pin { background: none; border: none; }

        .pin-ghost {
            position: fixed; z-index: 2000; pointer-events: none;
            transform: translate(-50%, -100%);
            filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55));
        }
        .pin-ghost .pin-svg { width: 36px; height: 46px; display: block; }

        /* ====================================================
           BOTTOM PANEL — 站點資訊抽屜
           ==================================================== */
        #panel {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 1200;
            background: var(--surface);
            border-top: 1px solid var(--border-strong);
            border-radius: 26px 26px 0 0;
            padding: 14px 22px calc(env(safe-area-inset-bottom, 16px) + 22px) 22px;
            box-shadow: var(--shadow-panel);
            transform: translateY(110%);
            transition: transform 0.34s cubic-bezier(0.32, 0.72, 0.2, 1);
            max-height: 78vh;
            overflow-y: auto;
            overscroll-behavior: contain;
        }
        #panel.open { transform: translateY(0); }
        /* 上緣 handle bar：示意可上下拉動 */
        #panel::before {
            content: '';
            display: block;
            width: 42px; height: 4px;
            background: var(--border-strong);
            border-radius: 2px;
            margin: 0 auto 14px;
        }

        /* 站名：粗黑 + 左側 LINE 綠竖條 */
        .p-name {
            font-size: 21px;
            font-weight: 800;
            letter-spacing: -0.005em;
            line-height: 1.28;
            margin: 2px 0 2px;
            color: var(--text);
            display: flex; align-items: flex-start; gap: 10px;
        }
        .p-name::before {
            content: '';
            width: 3px;
            min-height: 24px;
            align-self: stretch;
            background: linear-gradient(180deg, var(--brand-light), var(--brand));
            border-radius: 2px;
            margin-top: 3px;
            flex-shrink: 0;
            box-shadow: 0 0 8px rgba(0,185,0,0.3);
        }

        /* 「一週收運」段落 eyebrow */
        .p-eyebrow {
            display: flex; align-items: center; gap: 8px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-mute);
            margin: 20px 0 6px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .p-eyebrow svg { width: 13px; height: 13px; color: var(--brand); flex-shrink: 0; }
        .p-eyebrow .eyebrow-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        #p-schedule { margin-bottom: 4px; }

        /* renderWeek() 產出的 HTML 結構不能改，但這裡用 CSS 全面美化 */
        .sch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 11px 0;
            font-size: 14px;
            border-bottom: 1px dashed var(--border);
        }
        .sch-row:last-child { border-bottom: 0; }
        /* 日期 + 時間：mono、稍微 muted 的等寬資料感 */
        .sch-day {
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        /* 收運類別：做成 LINE 綠藥丸 tag */
        .sch-types {
            display: inline-block;
            padding: 5px 11px;
            background: var(--brand-soft);
            color: var(--brand-light);
            border: 1px solid var(--brand-tint);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-align: center;
        }
        .sch-empty {
            color: var(--text-mute);
            padding: 24px 0;
            text-align: center;
            font-size: 13px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(0,0,0,0.18);
        }

        /* ====================================================
           ACTION BUTTONS — 三階層級
           p-route 動態 display:none 時，flex-wrap 會自動讓 fav/close
           回到第一行各佔 50%，layout 不會崩
           ==================================================== */
        .p-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }
        .p-actions button {
            border: 1px solid var(--border-strong);
            border-radius: 12px;
            padding: 13px 12px;
            font-family: var(--font-cjk);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            background: var(--surface-2);
            color: var(--text);
            transition: transform 0.12s ease, background 0.18s ease, color 0.18s ease;
        }
        .p-actions button:active { transform: scale(0.96); }

        /* PRIMARY — 顯示路線：滿版、LINE 綠實心、帶綠光 */
        #p-route {
            flex: 1 1 100%;
            background: var(--brand);
            border-color: var(--brand);
            color: #001a00;
            font-weight: 700;
            padding: 14px;
            box-shadow: 0 4px 14px rgba(0,185,0,0.28);
        }
        #p-route:active {
            background: var(--brand-light);
            box-shadow: 0 2px 8px rgba(0,185,0,0.4);
        }

        /* SECONDARY — 加入最愛：綠色描邊 + soft 背景 */
        #p-fav {
            flex: 1 1 calc(50% - 4px);
            background: var(--brand-soft);
            border-color: rgba(0,185,0,0.32);
            color: var(--brand-light);
        }

        /* TERTIARY — 關閉：透明 + 細邊 */
        #p-close {
            flex: 1 1 calc(50% - 4px);
            background: transparent;
            color: var(--text-dim);
            border-color: var(--border);
        }

        /* ====================================================
           TOAST — 玻璃藥丸
           ==================================================== */
        #toast {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 110px);
            left: 50%;
            transform: translate(-50%, 8px);
            z-index: 1300;
            background: var(--surface-glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.03em;
            max-width: calc(100vw - 32px);
            text-align: center;
            box-shadow: var(--shadow-2);
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        #toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- 頂部命令列：心跳燈 + 範圍標籤 + 半徑下拉 -->
<div id="topbar">
    <span class="topbar-label">範圍</span>
    <select id="radius" aria-label="搜尋半徑">
        <option value="0.05">50 m</option>
        <option value="0.1">100 m</option>
        <option value="0.2" selected>200 m</option>
        <option value="0.5">500 m</option>
    </select>
</div>

<!-- 底部站點資訊抽屜 -->
<div id="panel" role="dialog" aria-label="站點資訊">
    <div class="p-name" id="p-name">站點</div>

    <div class="p-eyebrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="5" width="18" height="16" rx="2"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <line x1="8" y1="3" x2="8" y2="7"/>
            <line x1="16" y1="3" x2="16" y2="7"/>
        </svg>
        一週收運 · WEEKLY SCHEDULE
        <span class="eyebrow-line"></span>
    </div>

    <div id="p-schedule"></div>

    <div class="p-actions">
        <button id="p-route">顯示路線</button>
        <button id="p-fav">加入最愛</button>
        <button id="p-close">關閉</button>
    </div>
</div>

<!-- 右下浮動按鈕：主題切換、拖曳搜尋針（次）、定位（主） -->
<div class="fab-stack">
    <button id="themeToggle" class="fab" title="切換地圖亮暗" aria-label="切換地圖亮暗">
        <!-- 太陽（暗色中顯示，按了會變亮） -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <line x1="12" y1="2"  x2="12" y2="4.5"/>
            <line x1="12" y1="19.5" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="4.5" y2="12"/>
            <line x1="19.5" y1="12" x2="22" y2="12"/>
            <line x1="4.6" y1="4.6" x2="6.4" y2="6.4"/>
            <line x1="17.6" y1="17.6" x2="19.4" y2="19.4"/>
            <line x1="4.6" y1="19.4" x2="6.4" y2="17.6"/>
            <line x1="17.6" y1="6.4" x2="19.4" y2="4.6"/>
        </svg>
        <!-- 月亮（亮色中顯示，按了會變暗） -->
        <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
    </button>
    <button id="dragPin" class="fab" title="拖我到地圖上選搜尋點" aria-label="拖曳設定搜尋點">
        <!-- 紅色搜尋大頭針（與地圖上會放的針視覺一致；class .pin-svg 是 CSS hook） -->
        <svg class="pin-svg" viewBox="0 0 24 32" aria-hidden="true">
            <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z"
                  fill="#e53935" stroke="#fff" stroke-width="2"/>
            <circle cx="12" cy="12" r="5" fill="#fff"/>
        </svg>
    </button>
    <button id="locateBtn" class="fab fab-primary" title="定位我的位置" aria-label="定位我的位置">
        <!-- 十字準星：currentColor 跟著按鈕主題色（LINE 綠 → 點擊時轉深綠） -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="12" r="7"/>
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
        </svg>
    </button>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
    // 後端注入（見 app/api/pages.py）。改用 Leaflet/OSM 後不再需要 Google Maps 金鑰。
    const LIFF_ID = "{{ liff_id }}";
    const DEFAULT_CENTER = { lat: 25.0478, lng: 121.5170 }; // 台北車站，最終後備

    // 地圖主題：dark（預設）/ light，存於 localStorage；同步加到 body class 控制 tile filter
    const MAP_THEME_KEY = 'mapTheme';
    function applyMapTheme(theme) {
        const t = theme === 'light' ? 'light' : 'dark';
        document.body.classList.toggle('map-dark',  t === 'dark');
        document.body.classList.toggle('map-light', t === 'light');
    }
    // 頁面一載入就套用（避免按鈕出現後才切，瞬閃）
    applyMapTheme(localStorage.getItem(MAP_THEME_KEY) || 'dark');
    document.getElementById('themeToggle').addEventListener('click', () => {
        const next = document.body.classList.contains('map-dark') ? 'light' : 'dark';
        applyMapTheme(next);
        localStorage.setItem(MAP_THEME_KEY, next);
    });

    let lineUserId = null;
    let map = null;
    let markers = [];        // 站點 marker
    let searchMarker = null; // 拖放到地圖上的搜尋大頭針（紅）
    let searchCenter = null; // 目前查詢中心 {lat,lng}（改半徑時沿用）
    let userMarker = null;   // 使用者目前位置圖標
    let rangeCircle = null;  // 搜尋範圍圓圈
    let routeLayer = null;   // 目前顯示的行駛路線（polyline + 該路線站點）
    let currentRouteId = null;

    // 目前選取的搜尋半徑（公里）
    function currentRadius() {
        return parseFloat(document.getElementById('radius').value) || 0.2;
    }

    // 統一後端呼叫：自動帶 X-Line-User-Id
    async function api(path, options = {}) {
        const headers = Object.assign(
            { 'Content-Type': 'application/json', 'X-Line-User-Id': lineUserId || '' },
            options.headers || {}
        );
        const res = await fetch(`/api${path}`, { ...options, headers });
        return res.json();
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.innerText = msg;
        el.classList.add('show');
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // 定位優先序：① GPS 實際位置 → ② 第一個最愛點 → ③ 預設點
    function getGeo() {
        return new Promise(resolve => {
            if (!navigator.geolocation) {
                toast('此裝置/瀏覽器不支援定位');
                return resolve(null);
            }
            navigator.geolocation.getCurrentPosition(
                pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                err => {
                    // 把失敗原因顯示出來，方便判斷是權限、訊號還是逾時
                    const reason = err.code === 1 ? '定位權限被拒：請到手機設定／LINE 開啟定位權限'
                        : err.code === 2 ? '無法取得位置：定位服務目前無法使用'
                        : err.code === 3 ? '定位逾時：請在收得到 GPS 訊號處再試'
                        : '定位失敗';
                    console.error('geolocation error', err.code, err.message);
                    toast(reason + '（已暫用預設位置）');
                    resolve(null);
                },
                // 低精度（網路定位）在手機/室內更快更容易成功；找附近站點不需高精度 GPS
                { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 }
            );
        });
    }

    async function getFirstFavorite() {
        try {
            const r = await api('/me/stations');
            if (r.status === 'success' && Array.isArray(r.data) && r.data.length > 0) {
                const f = r.data[0];
                if (f.latitude != null && f.longitude != null) {
                    return { lat: +f.latitude, lng: +f.longitude };
                }
            }
        } catch (e) {
            // 未綁定 / 後端錯都不該阻擋地圖初始化；fallback 到 DEFAULT_CENTER
            console.warn('getFirstFavorite failed', e);
        }
        return null;
    }

    // 紅色搜尋大頭針圖示（與站點藍針、自己藍點區隔）
    const searchPinIcon = L.divIcon({
        className: 'search-pin',
        html: '<svg width="32" height="42" viewBox="0 0 24 32">'
            + '<path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z" fill="#e53935" stroke="#fff" stroke-width="2"/>'
            + '<circle cx="12" cy="12" r="5" fill="#fff"/></svg>',
        iconSize: [32, 42], iconAnchor: [16, 42]
    });

    // 放置／移動搜尋大頭針：拖放後以新位置重新搜尋
    function placeSearchMarker(pos) {
        if (searchMarker) { searchMarker.setLatLng([pos.lat, pos.lng]); return; }
        searchMarker = L.marker([pos.lat, pos.lng], {
            icon: searchPinIcon, draggable: true, zIndexOffset: 1000
        }).addTo(map).bindTooltip('搜尋點（可拖動微調）');
        searchMarker.on('dragend', () => {
            const p = searchMarker.getLatLng();
            searchStations(p.lat, p.lng);
        });
    }

    // 使用者目前位置圖標（藍點）；只有 GPS 真的定位成功才畫
    function setUserMarker(pos) {
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker([pos.lat, pos.lng], {
            radius: 8, color: '#ffffff', weight: 3,
            fillColor: '#1a73e8', fillOpacity: 1
        }).addTo(map).bindTooltip('你的位置');
    }

    // 鄰近搜尋：畫搜尋範圍圓圈 + 站點 marker
    // limit=200 為後端硬上限；達上限會提示縮小範圍（避免 marker 太多卡住地圖）
    const MAX_STATIONS = 200;
    async function searchStations(lat, lng) {
        searchCenter = { lat, lng };       // 記住查詢中心，改半徑時沿用
        const radiusKm = currentRadius();
        const r = await api(`/stations/search?lat=${lat}&lng=${lng}&radius=${radiusKm}&limit=${MAX_STATIONS}`);

        // 清掉上一輪的站點 marker
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        // 畫/更新搜尋範圍圓圈
        if (rangeCircle) map.removeLayer(rangeCircle);
        rangeCircle = L.circle([lat, lng], {
            radius: radiusKm * 1000,
            color: '#00B900', weight: 1,
            fillColor: '#00B900', fillOpacity: 0.08
        }).addTo(map);

        if (r.status !== 'success') { toast('搜尋失敗：' + (r.message || '')); return; }
        r.data.forEach(s => {
            const mk = L.marker([+s.latitude, +s.longitude]).addTo(map);
            mk.bindTooltip(s.station_name);
            mk.on('click', () => openStation(s.station_id, s.station_name));
            markers.push(mk);
        });
        if (r.data.length === 0) {
            toast(`附近 ${radiusKm} 公里內沒有站點`);
        } else if (r.data.length >= MAX_STATIONS) {
            toast(`此範圍站點超過 ${MAX_STATIONS} 個，建議縮小搜尋半徑`);
        }
    }

    // 把一週班表條列成「有收運的日子」：週X HH:MM + 當天收的種類
    const DOW = ['日', '一', '二', '三', '四', '五', '六'];
    function renderWeek(schedules, arriveTime) {
        if (!Array.isArray(schedules) || schedules.length === 0)
            return '<div class="sch-empty">本站無收運班表資料</div>';
        const time = arriveTime ? arriveTime.slice(0, 5) : '';
        const rows = schedules
            .slice()
            .sort((a, b) => a.day_of_week - b.day_of_week)
            .filter(s => s.collects_garbage || s.collects_recycling || s.collects_foodscraps)
            .map(s => {
                const types = [];
                if (s.collects_garbage) types.push('一般垃圾');
                if (s.collects_recycling) types.push('資源回收');
                if (s.collects_foodscraps) types.push('廚餘');
                return `<div class="sch-row"><span class="sch-day">週${DOW[s.day_of_week]} ${time}</span>`
                     + `<span class="sch-types">${types.join('、')}</span></div>`;
            });
        return rows.length ? rows.join('') : '<div class="sch-empty">近 7 天無收運</div>';
    }

    // 點站 → 取明細（含班表）→ 條列一週收運 → 顯示面板
    async function openStation(stationId, fallbackName) {
        const r = await api(`/stations/${stationId}`);
        if (r.status !== 'success') { toast('讀取站點失敗：' + (r.message || '')); return; }
        const d = r.data;
        document.getElementById('p-name').innerText = d.station_name || fallbackName || '站點';
        document.getElementById('p-schedule').innerHTML = renderWeek(d.schedules, d.arrive_time);
        document.getElementById('p-fav').onclick = () => addFavorite(d.station_id);
        // 記住此站所屬路線，供「顯示路線」用；按鈕文字依該路線是否正在顯示
        currentRouteId = d.route ? d.route.route_id : null;
        const routeBtn = document.getElementById('p-route');
        routeBtn.style.display = currentRouteId ? 'block' : 'none';
        routeBtn.innerText = (routeLayer && routeLayer._forRoute === currentRouteId) ? '隱藏路線' : '顯示路線';
        document.getElementById('panel').classList.add('open');
    }

    async function addFavorite(stationId) {
        const r = await api('/me/stations', { method: 'POST', body: JSON.stringify({ station_id: stationId }) });
        if (r.status === 'success') toast('已加入最愛！');
        else toast('加入失敗：' + (r.message || '')); // 409＝已收藏過此站點
    }

    // 清掉目前顯示的行駛路線
    function clearRoute() {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    }

    // 畫出某條路線：站點依序連成折線 + 各站小圓點（編號＝行駛順序）
    async function showRoute(routeId) {
        const r = await api(`/stations/by-route/${routeId}`);
        if (r.status !== 'success' || !Array.isArray(r.data) || r.data.length === 0) {
            toast('讀取路線失敗或此路線無站點');
            return;
        }
        clearRoute();
        const pts = r.data.map(s => [s.latitude, s.longitude]);
        const line = L.polyline(pts, { color: '#1a73e8', weight: 4, opacity: 0.8 });
        // 沿線加方向箭頭，標示行駛方向（站點順序＝行駛順序）
        const arrows = L.polylineDecorator(line, {
            patterns: [{
                offset: 12,
                repeat: 80,
                symbol: L.Symbol.arrowHead({
                    pixelSize: 10,
                    polygon: false,
                    pathOptions: { color: '#ffffff', weight: 3, opacity: 0.9 }
                })
            }]
        });
        const dots = r.data.map((s, i) =>
            L.circleMarker([s.latitude, s.longitude], {
                radius: 4, color: '#fff', weight: 1, fillColor: '#1a73e8', fillOpacity: 1
            }).bindTooltip(`${i + 1}. ${s.station_name}`));
        routeLayer = L.layerGroup([line, arrows, ...dots]).addTo(map);
        routeLayer._forRoute = routeId;   // 記住目前顯示的是哪條路線
        map.fitBounds(line.getBounds(), { padding: [40, 40] });
    }

    // 「顯示/隱藏路線」切換
    document.getElementById('p-route').onclick = async () => {
        if (!currentRouteId) { toast('此站無路線資訊'); return; }
        const btn = document.getElementById('p-route');
        if (routeLayer && routeLayer._forRoute === currentRouteId) {
            clearRoute();
            btn.innerText = '顯示路線';
        } else {
            btn.innerText = '載入中…';
            await showRoute(currentRouteId);
            btn.innerText = routeLayer ? '隱藏路線' : '顯示路線';
        }
    };

    document.getElementById('p-close').onclick = () =>
        document.getElementById('panel').classList.remove('open');

    // 改搜尋半徑 → 立即以目前查詢中心重查
    document.getElementById('radius').addEventListener('change', () => {
        if (!searchCenter) return;
        searchStations(searchCenter.lat, searchCenter.lng);
    });

    // 右下角 📍：手動重新定位（手勢觸發，成功率高於頁面載入時的自動定位）
    document.getElementById('locateBtn').onclick = async () => {
        if (!map) return;
        toast('定位中…');
        const geo = await getGeo();   // 失敗時 getGeo 內已 toast 原因
        if (!geo) return;
        map.setView([geo.lat, geo.lng], 16);
        setUserMarker(geo);
        // 定位＝以「我」為中心，移除先前手動拖放的搜尋針（避免兩個搜尋點指示）
        if (searchMarker) { map.removeLayer(searchMarker); searchMarker = null; }
        searchStations(geo.lat, geo.lng);
    };

    // 「搜尋點」圖釘按鈕：壓住往地圖拖、放開處放紅針並搜尋（滑鼠＋觸控皆支援）
    (function () {
        const btn = document.getElementById('dragPin');
        let ghost = null, startX = 0, startY = 0, moved = false;

        const startGhost = e => {
            if (!map) return;
            e.preventDefault();
            btn.setPointerCapture(e.pointerId);   // 之後 move/up 都鎖定在此按鈕
            startX = e.clientX; startY = e.clientY; moved = false;
            ghost = document.createElement('div');
            ghost.className = 'pin-ghost';
            ghost.innerHTML = btn.innerHTML;
            document.body.appendChild(ghost);
            moveGhost(e);
        };
        const moveGhost = e => {
            if (!ghost) return;
            if (Math.hypot(e.clientX - startX, e.clientY - startY) > 8) moved = true;
            ghost.style.left = e.clientX + 'px';
            ghost.style.top = e.clientY + 'px';
        };
        const endGhost = e => {
            if (!ghost) return;
            ghost.remove(); ghost = null;
            if (!moved) { toast('壓住圖釘拖到地圖上放開，即可選搜尋點'); return; }
            const rect = map.getContainer().getBoundingClientRect();
            const inside = e.clientX >= rect.left && e.clientX <= rect.right
                        && e.clientY >= rect.top && e.clientY <= rect.bottom;
            if (!inside) return;   // 放在地圖外 → 取消
            const ll = map.containerPointToLatLng(
                L.point(e.clientX - rect.left, e.clientY - rect.top));
            placeSearchMarker({ lat: ll.lat, lng: ll.lng });
            searchStations(ll.lat, ll.lng);
        };
        btn.addEventListener('pointerdown', startGhost);
        btn.addEventListener('pointermove', moveGhost);
        btn.addEventListener('pointerup', endGhost);
        btn.addEventListener('pointercancel', () => { if (ghost) { ghost.remove(); ghost = null; } });
    })();

    // 主流程
    async function main() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        lineUserId = profile.userId;

        const geo = await getGeo();
        const center = geo || (await getFirstFavorite()) || DEFAULT_CENTER;

        // 初始化 Leaflet 地圖 + OpenStreetMap 圖磚
        map = L.map('map', { zoomControl: true }).setView([center.lat, center.lng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> 貢獻者'
        }).addTo(map);

        // 只有實際 GPS 定位成功才畫「使用者位置」
        if (geo) setUserMarker(geo);

        // 一開始不放搜尋針（圖釘住在右下按鈕裡，由使用者拖放到地圖上）
        searchStations(center.lat, center.lng);
    }

    main().catch(e => {
        console.error(e);
        toast('初始化失敗，請在 LINE App 內開啟此頁。');
    });
</script>

</body>
</html>
