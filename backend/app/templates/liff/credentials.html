<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>設定帳號密碼</title>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary: #00B900; /* LINE Green */
            --bg-color: #121212;
            --surface: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #888888;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--surface);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--primary);
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.3s ease;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }
        .profile-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 10px;
        }
        .profile-preview img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        #bound-section { text-align: center; }
        .bound-email {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 12px 0;
            word-break: break-all;
        }
        .bound-hint { color: var(--text-muted); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>設定帳號密碼</h2>

    <!-- 顯示 LINE 抓到的頭像與名稱（純顯示，告知正在為哪個帳號設定） -->
    <div class="profile-preview" id="profile-section" style="display: none;">
        <img id="profile-img" src="" alt="avatar">
        <span id="profile-name">載入中...</span>
    </div>

    <form id="credentialsForm">
        <div class="form-group">
            <label>電子信箱 Email</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
            <label>密碼（至少 6 碼）</label>
            <input type="password" id="password" placeholder="設定登入密碼" required>
        </div>
        <div class="form-group">
            <label>確認密碼</label>
            <input type="password" id="password2" placeholder="再次輸入密碼" required>
        </div>
        <button type="submit" id="submitBtn">儲存設定</button>
    </form>

    <!-- 已綁定 email 者顯示此區，取代表單 -->
    <div id="bound-section" style="display: none;">
        <p class="bound-msg">你已經綁定 Email ✅</p>
        <p class="bound-email" id="bound-email"></p>
        <p class="bound-hint">此帳號已設定完成，無法再次設定。</p>
    </div>
</div>

<script>
    // 透過 Flask 後端渲染時，自動塞入 config.py 裡的 LIFF ID
    const LIFF_ID = "{{ liff_id }}";
    let lineUserId = null;

    // 統一的後端呼叫方式：自動帶上 X-Line-User-Id（簡易版身分識別）
    async function api(path, options = {}) {
        const headers = Object.assign(
            { 'Content-Type': 'application/json', 'X-Line-User-Id': lineUserId || '' },
            options.headers || {}
        );
        const res = await fetch(`/api${path}`, { ...options, headers });
        return res.json();
    }

    // 1. 初始化 LIFF
    async function initializeLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                // 如果是開在瀏覽器，強制導向 LINE 登入
                liff.login();
                return;
            }

            // 2. 獲取 LINE 使用者資料
            const profile = await liff.getProfile();
            lineUserId = profile.userId; // 設定帳密時以此帶 X-Line-User-Id 識別身分

            // 顯示大頭貼
            document.getElementById('profile-img').src = profile.pictureUrl;
            document.getElementById('profile-name').innerText = profile.displayName;
            document.getElementById('profile-section').style.display = 'flex';

            // 已綁定 email 者：改顯示「已綁定」狀態，不再提供設定表單
            const me = await api('/users/me');
            if (me.status === 'success' && me.data && me.data.email) {
                document.getElementById('bound-email').innerText = me.data.email;
                document.getElementById('credentialsForm').style.display = 'none';
                document.getElementById('bound-section').style.display = 'block';
                document.querySelector('h2').innerText = '帳號已綁定';
            }

        } catch (err) {
        console.error('LIFF 初始化失敗', err);
        alert(`LIFF error: ${err?.code || ''} ${err?.message || err}`);
    }
    }

    initializeLiff();

    // 3. 表單送出處理：PUT /api/users/credentials（需先綁定，靠 X-Line-User-Id 識別）
    document.getElementById('credentialsForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // 阻止畫面刷新

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        // 前端基本驗證（後端仍為真相來源）
        if (!email || !password) {
            alert('請填寫 Email 與密碼。');
            return;
        }
        if (password.length < 6) {
            alert('密碼至少需 6 碼。');
            return;
        }
        if (password !== password2) {
            alert('兩次輸入的密碼不一致。');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '處理中...';

        try {
            const result = await api('/users/credentials', {
                method: 'PUT',
                body: JSON.stringify({ email, password })
            });

            if (result.status === 'success') {
                alert('設定成功！');
                liff.closeWindow(); // 設定完自動關閉 LINE 視窗
            } else {
                // 409＝email 已被使用；其餘顯示後端訊息
                alert('設定失敗：' + (result.message || '請稍後再試。'));
                btn.disabled = false;
                btn.innerText = '儲存設定';
            }
        } catch (error) {
            alert('系統發生錯誤，請稍後再試。');
            btn.disabled = false;
            btn.innerText = '儲存設定';
        }
    });
</script>

</body>
</html>
