<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c0b">
    <title>設定帳號密碼</title>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* ===== Design tokens（與 map.html 一致；自成檔以維持單檔渲染） ===== */
        :root {
            --bg:            #0a0c0b;
            --surface:       #14181a;
            --surface-2:     #1c2024;
            --surface-3:     #232a2e;
            --border:        #262d31;
            --border-strong: #3a4046;

            --text:      #eef0ec;
            --text-dim:  #a8b0ac;
            --text-mute: #606a66;

            --brand:       #00B900;
            --brand-light: #2bd84e;
            --brand-soft:  rgba(0, 185, 0, 0.12);
            --brand-tint:  rgba(0, 185, 0, 0.22);
            --brand-glow:  0 0 24px rgba(0, 185, 0, 0.35);

            --danger:      #ff5e5b;
            --danger-soft: rgba(255, 94, 91, 0.12);

            --font-cjk:  'PingFang TC', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', 'Heiti TC', 'Noto Sans CJK TC', sans-serif;
            --font-mono: ui-monospace, 'SF Mono', SFMono-Regular, 'Cascadia Code', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; }
        body {
            min-height: 100vh;
            font-family: var(--font-cjk);
            font-feature-settings: "tnum" 1, "kern" 1;
            color: var(--text);
            background: var(--bg);
            /* 微弱的徑向光暈，讓畫面不死黑、但又克制 */
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,185,0,0.06), transparent 60%),
                radial-gradient(ellipse 60% 40% at 50% 110%, rgba(43,216,78,0.04), transparent 60%);
            padding:
                calc(env(safe-area-inset-top, 0px) + 24px)
                20px
                calc(env(safe-area-inset-bottom, 0px) + 24px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 380px;
            position: relative;
        }

        /* === Eyebrow：頁面頂部識別條，營造「重要動作」儀式感 === */
        .page-eyebrow {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 18px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--text-mute);
        }
        .page-eyebrow::before {
            content: '';
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--brand);
            box-shadow: var(--brand-glow);
            animation: pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .page-eyebrow .line {
            flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.35; transform: scale(0.8); }
        }

        h2 {
            margin: 0 0 10px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }
        .page-sub {
            margin: 0 0 28px;
            color: var(--text-dim);
            font-size: 13px;
            line-height: 1.6;
        }

        /* === Profile preview：顯示「正在為這個 LINE 帳號設定」 === */
        .profile-preview {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 22px;
            padding: 12px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }
        .profile-preview::after {
            /* 左側細直條，呼應 map.html 站名前的綠條 */
            content: '';
            position: absolute;
            left: 0; top: 12px; bottom: 12px;
            width: 3px;
            background: linear-gradient(180deg, var(--brand-light), var(--brand));
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 8px rgba(0,185,0,0.3);
        }
        .profile-preview img {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-strong);
        }
        .profile-meta {
            display: flex; flex-direction: column; gap: 2px; min-width: 0;
        }
        .profile-tag {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-mute);
        }
        #profile-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* === 表單 === */
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-mute);
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-strong);
            border-radius: 12px;
            background-color: var(--surface);
            color: var(--text);
            font-size: 15px;
            font-family: var(--font-cjk);
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        input::placeholder { color: var(--text-mute); }
        input:focus {
            outline: none;
            border-color: var(--brand);
            background-color: var(--surface-2);
            box-shadow: 0 0 0 4px var(--brand-soft);
        }
        input[type="email"] { font-family: var(--font-mono); letter-spacing: 0.01em; }

        /* === Submit button === */
        button[type="submit"] {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--brand);
            border-radius: 12px;
            background: var(--brand);
            color: #001a00;
            font-family: var(--font-cjk);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 6px 20px rgba(0,185,0,0.3);
            transition: transform 0.12s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        button[type="submit"]:active {
            transform: scale(0.98);
            background: var(--brand-light);
            box-shadow: 0 3px 10px rgba(0,185,0,0.4);
        }
        button[type="submit"]:disabled {
            background: var(--surface-3);
            border-color: var(--border-strong);
            color: var(--text-mute);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* === 已綁定狀態：替換表單，用一張資訊卡呈現 === */
        #bound-section {
            text-align: center;
            padding: 32px 22px;
            background: var(--surface);
            border: 1px solid var(--brand-tint);
            border-radius: 18px;
            position: relative;
            overflow: hidden;
        }
        #bound-section::before {
            /* 卡片頂部一條 LINE 綠光帶 */
            content: '';
            position: absolute;
            top: 0; left: 16px; right: 16px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent);
            box-shadow: 0 0 12px rgba(0,185,0,0.5);
        }
        .bound-check {
            width: 56px; height: 56px;
            margin: 0 auto 14px;
            border-radius: 50%;
            background: var(--brand-soft);
            border: 1px solid var(--brand-tint);
            display: flex; align-items: center; justify-content: center;
            color: var(--brand-light);
        }
        .bound-check svg { width: 28px; height: 28px; }
        .bound-msg {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .bound-email {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 500;
            color: var(--brand-light);
            background: var(--brand-soft);
            border: 1px solid var(--brand-tint);
            padding: 8px 14px;
            border-radius: 8px;
            display: inline-block;
            margin: 0 0 14px;
            word-break: break-all;
        }
        .bound-hint {
            color: var(--text-mute);
            font-size: 12px;
            margin: 0;
            line-height: 1.6;
        }

        /* === Footnote：小提醒，固定底部不喧賓奪主 === */
        .footnote {
            margin-top: 22px;
            padding: 12px 14px;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: 10px;
            font-size: 11px;
            color: var(--text-mute);
            line-height: 1.6;
            display: flex; gap: 10px;
        }
        .footnote svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; color: var(--brand); }
    </style>
</head>
<body>

<div class="container">

    <div class="page-eyebrow">
        BIND · 設定登入帳號
        <span class="line"></span>
    </div>

    <h2>設定帳號密碼</h2>
    <p class="page-sub">綁定 Email 與密碼後，未來可在管理後台登入；同一帳號也用來決定是否能升級為管理員。</p>

    <!-- 顯示 LINE 抓到的頭像與名稱（純顯示，告知正在為哪個帳號設定） -->
    <div class="profile-preview" id="profile-section" style="display: none;">
        <img id="profile-img" src="" alt="avatar">
        <div class="profile-meta">
            <span class="profile-tag">LINE Identity</span>
            <span id="profile-name">載入中...</span>
        </div>
    </div>

    <form id="credentialsForm">
        <div class="form-group">
            <label for="email">電子信箱 / EMAIL</label>
            <input type="email" id="email" placeholder="example@mail.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">密碼 / PASSWORD（≥ 6 碼）</label>
            <input type="password" id="password" placeholder="設定登入密碼" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="password2">確認密碼 / CONFIRM</label>
            <input type="password" id="password2" placeholder="再次輸入密碼" required autocomplete="new-password">
        </div>
        <button type="submit" id="submitBtn">儲存設定</button>
    </form>

    <!-- 已綁定 email 者顯示此區，取代表單 -->
    <div id="bound-section" style="display: none;">
        <div class="bound-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="5 12 10 17 19 7"/>
            </svg>
        </div>
        <p class="bound-msg">此帳號已完成綁定</p>
        <span class="bound-email" id="bound-email"></span>
        <p class="bound-hint">為了帳號安全，已綁定的 Email 無法在 LIFF 內再次修改。如需變更請聯絡管理員。</p>
    </div>

    <div class="footnote">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="13"/>
            <circle cx="12" cy="16.5" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
        <span>密碼僅以單向雜湊存放於伺服器；LIFF 與後端之間以 HTTPS 傳輸。請使用未在他處用過的密碼。</span>
    </div>
</div>

<script>
    // 透過 Flask 後端渲染時，自動塞入 config.py 裡的 LIFF ID
    const LIFF_ID = "{{ liff_id }}";
    let lineUserId = null;

    // 統一的後端呼叫方式：自動帶上 X-Line-User-Id（簡易版身分識別）
    async function api(path, options = {}) {
        const headers = Object.assign(
            { 'Content-Type': 'application/json', 'X-Line-User-Id': lineUserId || '' },
            options.headers || {}
        );
        const res = await fetch(`/api${path}`, { ...options, headers });
        return res.json();
    }

    // 1. 初始化 LIFF
    async function initializeLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                // 如果是開在瀏覽器，強制導向 LINE 登入
                liff.login();
                return;
            }

            // 2. 獲取 LINE 使用者資料
            const profile = await liff.getProfile();
            lineUserId = profile.userId; // 設定帳密時以此帶 X-Line-User-Id 識別身分

            // 顯示大頭貼
            document.getElementById('profile-img').src = profile.pictureUrl;
            document.getElementById('profile-name').innerText = profile.displayName;
            document.getElementById('profile-section').style.display = 'flex';

            // 已綁定 email 者：改顯示「已綁定」狀態，不再提供設定表單
            const me = await api('/users/me');
            if (me.status === 'success' && me.data && me.data.email) {
                document.getElementById('bound-email').innerText = me.data.email;
                document.getElementById('credentialsForm').style.display = 'none';
                document.getElementById('bound-section').style.display = 'block';
                document.querySelector('h2').innerText = '帳號已綁定';
            }

        } catch (err) {
            console.error('LIFF 初始化失敗', err);
            alert('無法連接到 LINE 系統，請在 LINE APP 中開啟此頁面。');
        }
    }

    initializeLiff();

    // 3. 表單送出處理：PUT /api/users/credentials（需先綁定，靠 X-Line-User-Id 識別）
    document.getElementById('credentialsForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // 阻止畫面刷新

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        // 前端基本驗證（後端仍為真相來源）
        if (!email || !password) {
            alert('請填寫 Email 與密碼。');
            return;
        }
        if (password.length < 6) {
            alert('密碼至少需 6 碼。');
            return;
        }
        if (password !== password2) {
            alert('兩次輸入的密碼不一致。');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '處理中...';

        try {
            const result = await api('/users/credentials', {
                method: 'PUT',
                body: JSON.stringify({ email, password })
            });

            if (result.status === 'success') {
                alert('設定成功！');
                liff.closeWindow(); // 設定完自動關閉 LINE 視窗
            } else {
                // 409＝email 已被使用；其餘顯示後端訊息
                alert('設定失敗：' + (result.message || '請稍後再試。'));
                btn.disabled = false;
                btn.innerText = '儲存設定';
            }
        } catch (error) {
            alert('系統發生錯誤，請稍後再試。');
            btn.disabled = false;
            btn.innerText = '儲存設定';
        }
    });
</script>

</body>
</html>
