<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>註冊垃圾車追蹤系統</title>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary: #00B900; /* LINE Green */
            --bg-color: #121212;
            --surface: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #888888;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--surface);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--primary);
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.3s ease;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }
        .profile-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 10px;
        }
        .profile-preview img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>LINE 帳號綁定</h2>
    
    <!-- 顯示 LINE 抓到的頭像與名稱 -->
    <div class="profile-preview" id="profile-section" style="display: none;">
        <img id="profile-img" src="" alt="avatar">
        <span id="profile-name">載入中...</span>
    </div>

    <form id="registerForm">
        <div class="form-group">
            <label>電子信箱 Email (選填)</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>
        <button type="submit" id="submitBtn">完成綁定</button>
    </form>
</div>

<script>
    // 透過 Flask 後端渲染時，自動塞入 config.py 裡的 LIFF ID
    const LIFF_ID = "{{ liff_id }}"; 
    let lineUserId = null;

    // 1. 初始化 LIFF
    async function initializeLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                // 如果是開在瀏覽器，強制導向 LINE 登入
                liff.login();
                return;
            }
            
            // 2. 獲取 LINE 使用者資料
            const profile = await liff.getProfile();
            lineUserId = profile.userId; // 這是極度重要的 LINE 內部 ID
            
            // 顯示大頭貼
            document.getElementById('profile-img').src = profile.pictureUrl;
            document.getElementById('profile-name').innerText = profile.displayName;
            document.getElementById('profile-section').style.display = 'flex';

        } catch (err) {
            console.error('LIFF 初始化失敗', err);
            alert('無法連接到 LINE 系統，請在 LINE APP 中開啟此頁面。');
        }
    }

    initializeLiff();

    // 3. 表單送出處理
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // 阻止畫面刷新
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '處理中...';

        const data = {
            email: document.getElementById('email').value || null,
            line_user_id: lineUserId // 綁定核心：LINE 內部 ID（username/密碼皆不收）
        };

        try {
            // 打 API 給我們剛剛用 Python 寫好的後端
            // (注意：若是手機實測，這裡的 URL 必須是你的 ngrok 網址)
            const response = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            if (response.ok) {
                alert('綁定成功！');
                liff.closeWindow(); // 註冊完自動關閉 LINE 視窗
            } else {
                alert('綁定失敗：' + result.message);
                btn.disabled = false;
                btn.innerText = '完成綁定';
            }
        } catch (error) {
            alert('系統發生錯誤，請稍後再試。');
            btn.disabled = false;
            btn.innerText = '完成綁定';
        }
    });
</script>

</body>
</html>
